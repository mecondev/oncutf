name: Tests (uv experiment)

# Version B: Safe uv experiment workflow
# This workflow uses astral-sh/setup-uv for faster dependency resolution
# in pip-compatible mode (not full project-mode migration yet)

on:
  push:
    branches: [ main, develop, experiment/uv ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: tests-uv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system ruff

    - name: Run Ruff
      run: ruff check .

  typecheck:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run mypy
      run: mypy .

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        # Smart matrix: full coverage on PR, lighter on push
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.12", "3.13"]') || fromJSON('["3.12"]') }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xfixes0 libxcb-shape0 libxcb-sync1 libxcb-xkb1 libxkbcommon-x11-0 libxkbcommon0
        sudo apt-get install -y exiftool

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install exiftool

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Try Chocolatey first (with retry)
        $maxRetries = 3
        $retryCount = 0
        $installed = $false

        while (-not $installed -and $retryCount -lt $maxRetries) {
          try {
            Write-Host "Attempt $($retryCount + 1) of $maxRetries..."
            choco install exiftool -y --timeout=300
            $installed = $true
            Write-Host "ExifTool installed via Chocolatey"
          }
          catch {
            $retryCount++
            if ($retryCount -lt $maxRetries) {
              Write-Host "Retry in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
        }

        # Fallback: Direct download from official source
        # Keep fallback pinned for CI stability; update only when upstream packaging changes
        if (-not $installed) {
          Write-Host "Chocolatey failed, downloading from exiftool.org..."
          $url = "https://exiftool.org/exiftool-13.33.zip"
          $zipPath = "$env:TEMP\exiftool.zip"
          $extractPath = "C:\exiftool"

          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Robustly find and rename exiftool exe (handles nested extraction)
          $exe = Get-ChildItem -Path $extractPath -Recurse -Filter "exiftool*.exe" | Select-Object -First 1
          if ($exe) {
            Rename-Item -Path $exe.FullName -NewName "exiftool.exe" -Force
            $finalPath = Split-Path -Parent $exe.FullName
            echo "$finalPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "ExifTool installed from official source"
          } else {
            Write-Error "Failed to locate exiftool executable"
            exit 1
          }
        }

        # Verify installation
        exiftool -ver

    - name: Install Python dependencies with uv
      run: |
        uv pip install --system -e ".[test,dev]"

    - name: Run tests with pytest (Linux)
      if: runner.os == 'Linux'
      env:
        DISPLAY: :99
      run: |
        xvfb-run -a pytest tests/ -v -x --tb=short
      timeout-minutes: 15

    - name: Run tests with pytest (macOS/Windows)
      if: runner.os != 'Linux'
      run: |
        pytest tests/ -v -x --tb=short
      timeout-minutes: 15
